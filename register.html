<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINIGAMES | Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">SHINIGAMES</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Главная</a></li>
                <li class="nav-item"><a href="games.html" class="nav-link">Игры</a></li>
                <li class="nav-item"><a href="#careers" class="nav-link">Карьера</a></li>
                <li class="nav-item"><a href="#support" class="nav-link">Поддержка</a></li>
            </ul>
            <div class="nav-auth">
                <a href="login.html" class="btn btn-outline btn-small">Войти</a>
                <a href="register.html" class="btn btn-primary btn-small">Регистрация</a>
            </div>
            <div class="nav-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>СОЗДАТЬ АККАУНТ</h2>
                <p class="auth-subtitle">Присоединяйтесь к сообществу SHINIGAMES</p>
                
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="username">Имя пользователя</label>
                        <input type="text" id="username" name="username" required>
                        <span class="error-message" id="username-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                        <span class="error-message" id="email-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" required>
                        <span class="error-message" id="password-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Подтвердите пароль</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                        <span class="error-message" id="confirm-password-error"></span>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
                </form>
                
                <div class="auth-links">
                    <p>Уже есть аккаунт? <a href="login.html">Войдите</a></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 SHINIGAMES. Все права защищены.</p>
            <ul class="footer-links">
                <li><a href="#">Политика конфиденциальности</a></li>
                <li><a href="#">Условия использования</a></li>
                <li><a href="#">Кодекс поведения</a></li>
            </ul>
        </div>
    </footer>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
